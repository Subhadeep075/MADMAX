# =====================
# Server
# =====================
server.port=${SERVER_PORT:8080}

# =====================
# MySQL
# =====================
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/digital_cyber_seva?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${DB_USERNAME:dcs_user}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =====================
# JWT
# =====================
app.jwt.secret=${JWT_SECRET:change-this-to-a-long-random-secret-key-at-least-32-characters}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Comma-separated list. Keep localhost entries for local dev.
app.cors.additional-origin-patterns=${APP_CORS_ADDITIONAL_ORIGIN_PATTERNS:http://localhost:4200,http://127.0.0.1:4200,http://localhost:8100,http://127.0.0.1:8100,http://localhost:8081,http://127.0.0.1:8081}

# =====================
# File Storage
# provider: cloudinary | local
# =====================
storage.provider=${STORAGE_PROVIDER:local}
storage.fallback-to-local=${STORAGE_FALLBACK_TO_LOCAL:true}
storage.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
storage.cloudinary.api-key=${CLOUDINARY_API_KEY:}
storage.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
storage.local.base-path=${LOCAL_STORAGE_BASE_PATH:uploads}
storage.local.public-base-url=${LOCAL_STORAGE_PUBLIC_BASE_URL:http://localhost:${server.port}/uploads}

# =====================
# Upload limits
# =====================
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:15MB}

# =====================
# Account deletion cleanup
# =====================
account-deletion.cleanup.retention-days=${ACCOUNT_DELETION_RETENTION_DAYS:7}
account-deletion.cleanup.cron=${ACCOUNT_DELETION_CLEANUP_CRON:0 30 2 * * *}
account-deletion.cleanup.zone=${ACCOUNT_DELETION_CLEANUP_ZONE:Asia/Kolkata}

# =====================
# Past records (admin)
# =====================
records.retention-days=${RECORDS_RETENTION_DAYS:30}
records.archive.cron=${RECORDS_ARCHIVE_CRON:0 15 3 * * *}
records.archive.zone=${RECORDS_ARCHIVE_ZONE:Asia/Kolkata}
records.archive.directory=${RECORDS_ARCHIVE_DIRECTORY:archives/past-records}
records.cleanup.cron=${RECORDS_CLEANUP_CRON:0 45 3 * * *}
records.cleanup.zone=${RECORDS_CLEANUP_ZONE:Asia/Kolkata}
