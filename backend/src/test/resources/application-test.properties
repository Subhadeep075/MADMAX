# In-memory DB for tests (no MySQL dependency)
spring.datasource.url=jdbc:h2:mem:dcs_test_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Use create-only to avoid noisy H2 drop warnings in test startup/shutdown
spring.jpa.hibernate.ddl-auto=create-only
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Keep storage beans harmless during tests
storage.provider=cloudinary
storage.cloudinary.cloud-name=test
storage.cloudinary.api-key=test
storage.cloudinary.api-secret=test

app.jwt.secret=test-secret-key-for-jwt-which-is-long-enough-1234567890
app.jwt.expiration-ms=3600000
