name: CI

on:
  push:
    branches: [ "digital-cyber-seva" ]
  pull_request:
    branches: [ "main", "digital-cyber-seva" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-build:
    name: backend-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build backend (compile)
        run: mvn -B -DskipTests compile

  admin-web-build:
    name: admin-web-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build admin-web (production)
        run: npx ng build --configuration production --progress=false

  customer-app-build:
    name: customer-app-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: customer-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: customer-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build customer-app (production)
        run: npx ng build --configuration production --progress=false
