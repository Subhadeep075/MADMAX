name: Feature request
description: Propose a new feature or improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem are we solving?
      placeholder: Explain the problem in simple terms
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should be built?
      placeholder: Describe expected UX/API behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - backend
        - admin-web
        - customer-app
        - docs
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Define "done"
      placeholder: |
        - [ ] ...
        - [ ] ...

