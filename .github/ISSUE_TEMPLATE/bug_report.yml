name: Bug report
description: Report a reproducible bug
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please provide clear reproduction steps.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Short description of the issue
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Numbered steps
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happens?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - backend
        - admin-web
        - customer-app
        - devops/ci
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Device/OS/browser/app mode
      placeholder: macOS + Chrome, Android 14 APK, etc.
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste error messages, stack traces, or screenshots

