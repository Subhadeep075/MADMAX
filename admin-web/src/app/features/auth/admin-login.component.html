    <div class="login-shell">
      <div class="login-card">
        <h2>Digital Cyber Seva</h2>
        <p class="text-muted mb-4">Admin Login (mobile/email + password)</p>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label">Mobile / Email</label>
            <input class="form-control" formControlName="username" placeholder="Enter mobile or email" />
            <small class="text-danger" *ngIf="submitted && loginForm.controls.username.invalid">
              Username is required.
            </small>
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input [type]="showPassword ? 'text' : 'password'" class="form-control" formControlName="password" placeholder="Enter password" />
            <small class="text-danger" *ngIf="submitted && loginForm.controls.password.invalid">
              Password is required.
            </small>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="form-check">
              <input
                id="showPassword"
                class="form-check-input"
                type="checkbox"
                [checked]="showPassword"
                (change)="showPassword = $any($event.target).checked"
              />
              <label class="form-check-label" for="showPassword">Show password</label>
            </div>

            <div class="form-check">
              <input
                id="rememberUserId"
                class="form-check-input"
                type="checkbox"
                formControlName="rememberUserId"
              />
              <label class="form-check-label" for="rememberUserId">Remember user ID</label>
            </div>
          </div>

          <div *ngIf="errorMessage" class="alert alert-danger py-2">{{ errorMessage }}</div>

          <button type="submit" class="btn btn-primary w-100 btn-lg" [disabled]="loading">
            {{ loading ? 'Signing In...' : 'Sign In' }}
          </button>
        </form>
      </div>
    </div>
